name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: Metadata, docs, and format
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Validate package and documentation
        run: bash Scripts/validate-baseline.sh

      - name: Lint
        run: xcrun swift-format lint --strict --recursive Sources/ Tests/ Package.swift

  dependency-and-platform:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Minimum dependencies (Xcode 16.3)
            os: macos-15
            xcode_path: /Applications/Xcode_16.3.app/Contents/Developer
            dependency_set: minimum
          - name: Latest dependencies (current Xcode)
            os: macos-26
            xcode_path: default
            dependency_set: latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        if: matrix.xcode_path != 'default'
        run: sudo xcode-select -s "${{ matrix.xcode_path }}"

      - name: Toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve ${{ matrix.dependency_set }} dependencies
        run: bash Scripts/resolve-dependencies.sh "${{ matrix.dependency_set }}"

      - name: Build for macOS
        run: swift build

      - name: Test on macOS
        run: swift test

      # The macOS 15 image does not install Xcode 16.3's iOS 18.4 platform.
      # The latest lane remains the generic iOS build gate.
      - name: Build all products for iOS
        if: matrix.dependency_set == 'latest'
        run: |
          for scheme in ComposableOTel ComposableOTelExporters ComposableOTelTesting; do
            xcodebuild \
              -skipMacroValidation \
              -scheme "$scheme" \
              -destination "generic/platform=iOS" \
              -configuration Debug \
              CODE_SIGNING_ALLOWED=NO \
              build
          done

  documentation:
    name: DocC
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest dependencies
        run: bash Scripts/resolve-dependencies.sh latest

      - name: Build documentation catalogs
        env:
          DERIVED_DATA_PATH: ${{ runner.temp }}/DerivedData
        run: bash Scripts/build-documentation.sh
