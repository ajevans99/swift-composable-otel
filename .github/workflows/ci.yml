name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (Xcode ${{ matrix.xcode }})
    runs-on: macos-15
    strategy:
      matrix:
        xcode: ["16.3"]
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer

      - name: Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  lint:
    name: Lint (swift-format)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install swift-format
        run: brew install swift-format

      - name: Lint
        run: swift-format lint --strict --recursive Sources/ Tests/ Package.swift
